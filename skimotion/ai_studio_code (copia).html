<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkiMotion LED Race Control</title>
    <!-- Librerías de MediaPipe -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
    
    <!-- Librería Paho MQTT para Web -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js" type="text/javascript"></script>
    
    <style>
        /* Estilos Generales y Tema Oscuro */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212; color: #ffffff;
            margin: 0; display: flex; flex-direction: column;
            align-items: center; padding: 10px; overflow-x: hidden;
        }
        
        /* Contenedor principal de la cámara más amplio */
        .container { 
            position: relative; width: 100%; max-width: 1000px; 
            margin-top: 10px; border-radius: 12px; overflow: hidden;
            box-shadow: 0 8px 30px rgba(0,0,0,0.8);
        }
        video { display: none; }
        canvas {
            width: 100%; height: auto; background-color: #000; display: block;
        }

        /* --- UI Superpuesta en la Cámara --- */
        .overlay-ui {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; display: flex; flex-direction: column;
            justify-content: space-between; padding: 20px; box-sizing: border-box;
        }

        /* Velocímetro F1 */
        .f1-dashboard {
            align-self: flex-start; background: rgba(0, 0, 0, 0.7);
            border-left: 5px solid #ff0000; padding: 15px 25px;
            border-radius: 5px; text-transform: uppercase;
            font-family: 'Courier New', Courier, monospace;
            box-shadow: 0 0 15px rgba(255,0,0,0.3);
        }
        .f1-label { font-size: 0.9rem; color: #aaa; letter-spacing: 2px;}
        .f1-speed { font-size: 3.5rem; font-weight: bold; color: #fff; margin: 5px 0; text-shadow: 0 0 10px rgba(255,255,255,0.5);}
        .f1-unit { font-size: 1.2rem; color: #ff0000; }

        .counter-box {
            align-self: flex-end; background: rgba(0,0,0,0.6);
            padding: 10px 20px; border-radius: 10px; font-size: 1.5rem; font-weight: bold;
        }
        #count { color: #4CAF50; font-size: 2.5rem; }

        /* --- Botones --- */
        button {
            background-color: #0288d1; color: white; border: none;
            padding: 10px 15px; border-radius: 5px; cursor: pointer;
            font-size: 1rem; font-weight: bold; transition: 0.3s; pointer-events: auto;
        }
        button:hover { background-color: #0277bd; }
        button.danger { background-color: #d32f2f; }
        button.success { background-color: #388e3c; }
        button.warning { background-color: #f57c00; }
        button.action { background-color: #673ab7; margin-bottom: 10px;}

        /* --- Ventana Modal de Configuración --- */
        .modal {
            display: none; position: fixed; z-index: 1000; left: 0; top: 0;
            width: 100%; height: 100%; background-color: rgba(0,0,0,0.8);
            align-items: center; justify-content: center;
        }
        .modal-content {
            background-color: #1e1e1e; padding: 25px; border-radius: 10px;
            width: 90%; max-width: 600px; box-shadow: 0 5px 25px rgba(0,0,0,0.9);
            position: relative; border: 1px solid #333;
        }
        .close-btn {
            position: absolute; top: 15px; right: 20px; color: #aaa;
            font-size: 28px; font-weight: bold; cursor: pointer;
        }
        .close-btn:hover { color: white; }

        .config-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); 
            gap: 15px; margin-bottom: 20px; margin-top: 15px;
        }
        .config-item { display: flex; flex-direction: column; }
        .config-item label { font-size: 0.85rem; color: #aaa; margin-bottom: 5px; }
        .config-item input, .config-item select {
            background-color: #2c2c2c; color: white; border: 1px solid #444;
            padding: 8px; border-radius: 5px; font-size: 1rem;
        }
        
        #status-indicator { padding: 5px 15px; border-radius: 20px; font-size: 0.9rem; font-weight: bold; background-color: #ff9800; pointer-events: auto;}
        #mqtt-status { padding: 5px 15px; border-radius: 20px; font-size: 0.9rem; font-weight: bold; background-color: #d32f2f; color: white; }

        .race-controls { display: flex; gap: 10px; justify-content: space-between; border-top: 1px solid #333; padding-top: 15px; flex-wrap: wrap;}
    </style>
</head>
<body>

    <h2 style="margin: 5px 0;">⛷️ SkiMotion F1 Racing</h2>
    
    <!-- Botones de control superior -->
    <div style="display: flex; gap: 15px; align-items: center; margin-bottom: 5px;">
        <button class="action" onclick="openModal()">⚙️ Abrir Configuración</button>
        <span id="status-indicator">Iniciando cámara...</span>
        <button id="btn-pause" class="warning" onclick="togglePause()">⏸️ Pausar</button>
    </div>

    <!-- MODAL DE CONFIGURACIÓN -->
    <div id="configModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <h3>⚙️ Configuración del ESP8266</h3>
            <p style="font-size: 0.8rem; color: #ff9800;">Nota: Si la conexión MQTT falla, asegúrate de no estar usando HTTPS.</p>
            
            <div class="config-grid">
                <div class="config-item">
                    <label>Broker MQTT (IP o URL):</label>
                    <input type="text" id="mqtt-host" value="192.168.1.1">
                </div>
                <div class="config-item">
                    <label>Puerto WebSockets:</label>
                    <input type="number" id="mqtt-port" value="9001">
                </div>
                <div class="config-item">
                    <label>Ruta (Generalmente / o /mqtt):</label>
                    <input type="text" id="mqtt-path" value="/">
                </div>
                <div class="config-item">
                    <label>Prefijo Pista (Ej. track01):</label>
                    <input type="text" id="mqtt-prefix" value="track01">
                </div>
                <div class="config-item">
                    <label>Jugador (Cámara actual):</label>
                    <select id="player-select" onchange="updateUIColors()">
                        <option value="greencar">🟢 Coche Verde (P1)</option>
                        <option value="redcar">🔴 Coche Rojo (P2)</option>
                    </select>
                </div>
            </div>
            
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <button onclick="connectMQTT()">🔌 Conectar a MQTT</button>
                <span id="mqtt-status">Desconectado</span>
            </div>

            <div class="race-controls">
                <button class="success" onclick="sendF1Start()">🚦 SALIDA F1</button>
                <div style="display:flex; gap:5px; align-items: center;">
                    <input type="number" id="laps-input" value="5" min="1" max="99" style="width: 50px; background:#2c2c2c; color:white; border:1px solid #444; padding:8px; border-radius:5px;">
                    <button class="warning" onclick="sendLaps()">⚙️ Fijar Vueltas</button>
                </div>
                <label style="display: flex; align-items: center; gap: 5px; color: #aaa; cursor: pointer;">
                    <input type="checkbox" id="chk-skeleton" checked> Ver Esqueleto
                </label>
            </div>
        </div>
    </div>

    <!-- CÁMARA, VIDEO Y UI SUPERPUESTA -->
    <div class="container">
        <video id="video_element" autoplay playsinline muted></video>
        <canvas id="canvas_element" width="1000" height="600"></canvas>
        
        <div class="overlay-ui">
            <!-- Velocímetro F1 -->
            <div class="f1-dashboard" id="speed-dashboard">
                <div class="f1-label">SPEED <span id="player-label">P1 (VERDE)</span></div>
                <div class="f1-speed" id="speed-value">0.00</div>
                <div class="f1-unit">KM/H</div>
            </div>

            <!-- Contador de Repeticiones -->
            <div class="counter-box">
                Impulsos: <span id="count">0</span>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // 0. CONTROL DE VENTANA MODAL Y UI
        // ==========================================
        const modal = document.getElementById("configModal");
        function openModal() { modal.style.display = "flex"; }
        function closeModal() { modal.style.display = "none"; }
        
        function updateUIColors() {
            const player = document.getElementById('player-select').value;
            const dash = document.getElementById('speed-dashboard');
            const label = document.getElementById('player-label');
            if(player === 'greencar') {
                dash.style.borderLeftColor = '#4CAF50';
                label.innerText = 'P1 (VERDE)';
            } else {
                dash.style.borderLeftColor = '#F44336';
                label.innerText = 'P2 (ROJO)';
            }
        }

        // ==========================================
        // 1. LÓGICA DE MQTT Y TELEMETRÍA
        // ==========================================
        let mqttClient = null;
        let isMqttConnected = false;

        function connectMQTT() {
            const host = document.getElementById('mqtt-host').value.trim();
            const port = parseInt(document.getElementById('mqtt-port').value);
            const path = document.getElementById('mqtt-path').value.trim() || "/";
            const prefix = document.getElementById('mqtt-prefix').value.trim();
            const statusBadge = document.getElementById('mqtt-status');
            
            const clientId = "SkiWeb_" + Math.random().toString(16).substr(2, 8);
            
            try {
                mqttClient = new Paho.MQTT.Client(host, port, path, clientId);
            } catch (error) {
                alert("Error creando cliente MQTT. ¿Estás usando HTTPs? Usa HTTP normal.");
                return;
            }

            mqttClient.onConnectionLost = function(responseObject) {
                isMqttConnected = false;
                statusBadge.innerText = "Desconectado";
                statusBadge.style.backgroundColor = "#d32f2f";
                console.log("MQTT Perdido: " + responseObject.errorMessage);
            };

            // Recibir telemetría del velocímetro
            mqttClient.onMessageArrived = function(message) {
                const topic = message.destinationName;
                const player = document.getElementById('player-select').value;
                const targetSpeedTopic = player === 'greencar' ? `${prefix}/greenspeed` : `${prefix}/redspeed`;

                if (topic === targetSpeedTopic) {
                    const speed = parseFloat(message.payloadString).toFixed(2);
                    document.getElementById('speed-value').innerText = speed;
                }
            };

            const options = {
                onSuccess: function() {
                    isMqttConnected = true;
                    statusBadge.innerText = "Conectado ✅";
                    statusBadge.style.backgroundColor = "#388e3c";
                    
                    // Suscribirse a las velocidades al conectar
                    mqttClient.subscribe(`${prefix}/greenspeed`);
                    mqttClient.subscribe(`${prefix}/redspeed`);
                },
                onFailure: function(message) {
                    isMqttConnected = false;
                    statusBadge.innerText = "Error WS";
                    statusBadge.style.backgroundColor = "#d32f2f";
                    alert("Falló la conexión. 1. Revisa IP/Puerto. 2. La ruta debe ser / o /mqtt. 3. Abre este archivo sin HTTPs.");
                }
            };

            statusBadge.innerText = "Conectando...";
            statusBadge.style.backgroundColor = "#ff9800";
            mqttClient.connect(options);
        }

        function sendMQTTCommand(topic, payload) {
            if (isMqttConnected && mqttClient) {
                const message = new Paho.MQTT.Message(payload.toString());
                message.destinationName = topic;
                mqttClient.send(message);
            }
        }

        function sendF1Start() {
            const prefix = document.getElementById('mqtt-prefix').value.trim();
            sendMQTTCommand(`${prefix}/start`, "1");
            repeticiones = 0;
            document.getElementById('count').innerText = repeticiones;
            document.getElementById('speed-value').innerText = "0.00";
            closeModal();
        }

        function sendLaps() {
            const prefix = document.getElementById('mqtt-prefix').value.trim();
            const laps = document.getElementById('laps-input').value;
            sendMQTTCommand(`${prefix}/set_laps`, laps);
            alert(`Vueltas enviadas al ESP8266: ${laps}`);
        }

        // ==========================================
        // 2. EFECTOS VISUALES (NIEVE EN CANVAS)
        // ==========================================
        let snowParticles = [];
        let snowTimer = 0;

        function triggerSnowEffect() {
            snowTimer = 45; // Durará 45 frames (aprox 1.5 segundos)
            if (snowParticles.length === 0) {
                for (let i = 0; i < 100; i++) {
                    snowParticles.push({
                        x: Math.random() * canvasElement.width,
                        y: Math.random() * canvasElement.height,
                        r: Math.random() * 3 + 1,
                        d: Math.random() * 10 // densidad/velocidad
                    });
                }
            }
        }

        function drawSnow(ctx) {
            if (snowTimer <= 0) return;
            ctx.fillStyle = "rgba(255, 255, 255, 0.8)";
            ctx.beginPath();
            for (let i = 0; i < snowParticles.length; i++) {
                let p = snowParticles[i];
                ctx.moveTo(p.x, p.y);
                ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2, true);
                p.y += Math.cos(p.d) + 1 + p.r / 2;
                p.x += Math.sin(p.d) * 2;
                if (p.x > canvasElement.width || p.x < 0 || p.y > canvasElement.height) {
                    p.x = Math.random() * canvasElement.width;
                    p.y = 0; // Vuelve arriba
                }
            }
            ctx.fill();
            snowTimer--;
        }

        // ==========================================
        // 3. LÓGICA DE VISIÓN, ESQUÍ Y TRUCO "GALLINA"
        // ==========================================
        const videoElement = document.getElementById('video_element');
        const canvasElement = document.getElementById('canvas_element');
        const canvasCtx = canvasElement.getContext('2d');
        const countDisplay = document.getElementById('count');
        const statusIndicator = document.getElementById('status-indicator');
        const chkSkeleton = document.getElementById('chk-skeleton');

        let repeticiones = 0;
        let estadoEsqui = 'ABAJO';
        let estadoGallina = 'ABAJO';
        let isPaused = false;
        let isProcessing = false;

        // Puntos anatómicos MediaPipe
        const L_SHOULDER = 11, R_SHOULDER = 12;
        const L_ELBOW = 13, R_ELBOW = 14;
        const L_WRIST = 15, R_WRIST = 16;
        const L_HIP = 23, R_HIP = 24;

        function onResults(results) {
            isProcessing = false;
            if (isPaused) return;

            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

            if (results.poseLandmarks) {
                if (chkSkeleton.checked) {
                    drawConnectors(canvasCtx, results.poseLandmarks, POSE_CONNECTIONS, {color: '#ffffff', lineWidth: 4});
                    drawLandmarks(canvasCtx, results.poseLandmarks, {color: '#FF0000', lineWidth: 2, radius: 3});
                }
                analizarMovimientos(results.poseLandmarks);
            }
            
            drawSnow(canvasCtx);
            canvasCtx.restore();
        }

        function analizarMovimientos(landmarks) {
            // Coordenadas Y (0.0 arriba, 1.0 abajo)
            const mIzqY = landmarks[L_WRIST].y;
            const mDerY = landmarks[R_WRIST].y;
            const cIzqY = landmarks[L_ELBOW].y;
            const cDerY = landmarks[R_ELBOW].y;
            const hIzqY = landmarks[L_SHOULDER].y;
            const hDerY = landmarks[R_SHOULDER].y;
            const cadIzqY = landmarks[L_HIP].y;
            const cadDerY = landmarks[R_HIP].y;

            // --- CÁLCULOS DEL ESQUÍ (Movimiento más corto) ---
            // Longitud del torso (de hombro a cadera)
            const torsoLengthIzq = cadIzqY - hIzqY;
            const torsoLengthDer = cadDerY - hDerY;
            
            // Umbral Arriba: Mitad del torso
            const mitadTorsoIzq = hIzqY + (torsoLengthIzq * 0.5);
            const mitadTorsoDer = hDerY + (torsoLengthDer * 0.5);
            
            // Umbral Abajo: Un poco por encima de la cadera (ej. 15% más arriba de la cadera)
            const cercaCaderaIzq = cadIzqY - (torsoLengthIzq * 0.15);
            const cercaCaderaDer = cadDerY - (torsoLengthDer * 0.15);

            const manosArriba = (mIzqY < mitadTorsoIzq) && (mDerY < mitadTorsoDer);
            const manosAbajo = (mIzqY > cercaCaderaIzq) && (mDerY > cercaCaderaDer);

            // --- CÁLCULOS TRUCO GALLINA (ALETEO) ---
            // Condiciones: Las manos deben estar arriba (cerca de hombros/pecho) 
            // y los codos suben por encima de los hombros y luego bajan.
            const aleteoArriba = (cIzqY < hIzqY) && (cDerY < hDerY) && manosArriba;
            const aleteoAbajo = (cIzqY > hIzqY + 0.05) && (cDerY > hDerY + 0.05) && manosArriba;

            // Lógica de Gallina (Aleteo = Doble impulso)
            if (aleteoArriba) {
                if (estadoGallina !== 'ARRIBA') estadoGallina = 'ARRIBA';
            } else if (aleteoAbajo) {
                if (estadoGallina === 'ARRIBA') {
                    estadoGallina = 'ABAJO';
                    registrarImpulso("¡Truco Gallina! x2 🐔", 2); // Envía 2 señales
                }
            }

            // Lógica Esquí normal
            if (manosArriba) {
                if (estadoEsqui !== 'ARRIBA') {
                    estadoEsqui = 'ARRIBA';
                    statusIndicator.innerText = "Posición lista";
                    statusIndicator.style.backgroundColor = "#2196F3"; 
                }
            } else if (manosAbajo) {
                if (estadoEsqui === 'ARRIBA') {
                    estadoEsqui = 'ABAJO';
                    registrarImpulso("¡Buen impulso! ⛷️", 1); // Envía 1 señal
                }
            }
        }

        function registrarImpulso(mensaje, cantidad) {
            repeticiones += cantidad;
            countDisplay.innerText = repeticiones;
            
            statusIndicator.innerText = mensaje;
            statusIndicator.style.backgroundColor = cantidad > 1 ? "#9c27b0" : "#4CAF50"; 
            
            triggerSnowEffect(); // Activar la nieve visual
            
            // Enviar aceleración al ESP8266
            const prefix = document.getElementById('mqtt-prefix').value.trim();
            const player = document.getElementById('player-select').value;
            
            // Si es truco gallina, enviamos rápido 2 veces
            sendMQTTCommand(`${prefix}/${player}`, "1");
            if (cantidad > 1) {
                setTimeout(() => sendMQTTCommand(`${prefix}/${player}`, "1"), 100);
            }

            // Animación del número
            countDisplay.style.transform = "scale(1.5)";
            setTimeout(() => countDisplay.style.transform = "scale(1)", 200);
        }

        // ==========================================
        // 4. INICIALIZACIÓN DE CÁMARA Y MEDIAPIPE
        // ==========================================
        const pose = new Pose({locateFile: (file) => {
            return `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`;
        }});

        pose.setOptions({
            modelComplexity: 1,
            smoothLandmarks: true,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        pose.onResults(onResults);

        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "user", width: { ideal: 1280 }, height: { ideal: 720 } }
                });
                videoElement.srcObject = stream;
                videoElement.onloadedmetadata = () => {
                    videoElement.play();
                    statusIndicator.innerText = "Cámara OK. Ponte en posición.";
                    processVideo(); 
                };
            } catch (err) {
                statusIndicator.innerText = "Error de cámara";
                alert("No se pudo iniciar la cámara. Verifica permisos o si estás en HTTP local.");
            }
        }

        async function processVideo() {
            if (!isPaused && !isProcessing && videoElement.readyState >= 2) {
                isProcessing = true;
                await pose.send({image: videoElement});
            }
            requestAnimationFrame(processVideo);
        }

        function togglePause() {
            isPaused = !isPaused;
            const btnPause = document.getElementById('btn-pause');
            if (isPaused) {
                btnPause.innerText = "▶️ Reanudar";
                statusIndicator.innerText = "Pausado";
                statusIndicator.style.backgroundColor = "#ff9800";
            } else {
                btnPause.innerText = "⏸️ Pausar";
                statusIndicator.innerText = "Cámara OK. Ponte en posición.";
            }
        }

        // Iniciar
        updateUIColors();
        startCamera();
    </script>
</body>
</html>
