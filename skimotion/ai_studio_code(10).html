<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkiMotion F1 Pro Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js" type="text/javascript"></script>
    
    <style>
        :root { --green-color: #00ff00; --red-color: #ff003c; }
        body { margin: 0; padding: 0; background-color: #000; font-family: 'Segoe UI', sans-serif; color: white; overflow: hidden; }
        .video-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }
        video { display: none; }
        canvas { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        .hud { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 15px 30px; background: linear-gradient(180deg, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 100%); pointer-events: auto; }
        .counter-box { font-size: 1.5rem; font-weight: bold; background: rgba(0,0,0,0.6); padding: 10px 20px; border-radius: 10px; border: 1px solid #333; }
        #count { color: var(--green-color); font-size: 2.5rem; margin-left: 10px;}
        .badge { padding: 5px 15px; border-radius: 20px; font-size: 0.85rem; font-weight: bold; text-transform: uppercase;}
        #mqtt-status { background-color: #d32f2f; }
        #status-indicator { background-color: #ff9800; }
        button { pointer-events: auto; background-color: rgba(2, 136, 209, 0.8); color: white; border: 1px solid rgba(255,255,255,0.2); padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .speedo-container { position: absolute; bottom: 30px; background: rgba(0,0,0,0.7); border-radius: 50%; padding: 10px; border: 2px solid #333; }
        .speedo-left { left: 30px; } .speedo-right { right: 30px; }
        .speedo-svg { transform: rotate(-90deg); width: 140px; height: 140px; }
        .speedo-bar { stroke-dasharray: 377; stroke-dashoffset: 377; transition: stroke-dashoffset 0.2s; }
        #bar-green { stroke: var(--green-color); } #bar-red { stroke: var(--red-color); }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.8); z-index: 100; display: none; justify-content: center; align-items: center; }
        .modal-content { background: #1e1e1e; padding: 30px; border-radius: 15px; width: 90%; max-width: 500px; }
    </style>
</head>
<body>
    <div class="video-container"><video id="video_element" autoplay playsinline muted></video><canvas id="canvas_element"></canvas></div>
    <div id="snow-layer"></div>
    <div class="hud">
        <div class="top-bar">
            <div class="stats">
                <div class="counter-box">AVANCES <span id="count">0</span></div>
                <div style="display:flex; flex-direction:column; gap:5px;">
                    <span id="mqtt-status" class="badge">🔌 MQTT Desconectado</span>
                    <span id="status-indicator" class="badge">📷 Iniciando Cámara...</span>
                </div>
            </div>
            <button onclick="toggleSettings()">⚙️</button>
        </div>
        <div class="speedo-container speedo-left"><svg class="speedo-svg"><circle cx="70" cy="70" r="60" stroke="#222" stroke-width="10" fill="none"></circle><circle id="bar-green" class="speedo-bar" cx="70" cy="70" r="60" stroke-width="10" fill="none"></circle></svg></div>
        <div class="speedo-container speedo-right"><svg class="speedo-svg"><circle cx="70" cy="70" r="60" stroke="#222" stroke-width="10" fill="none"></circle><circle id="bar-red" class="speedo-bar" cx="70" cy="70" r="60" stroke-width="10" fill="none"></circle></svg></div>
    </div>

    <div id="settings-modal" class="modal-overlay" style="display:flex;">
        <div class="modal-content">
            <h2>⚙️ Ajustes de Pista</h2>
            <input type="text" id="mqtt-host" value="192.168.1.1" style="width:100%; margin-bottom:10px;">
            <input type="number" id="mqtt-port" value="9001" style="width:100%; margin-bottom:10px;">
            <button style="width:100%; background:#388e3c;" onclick="connectMQTT()">🔌 Conectar</button>
        </div>
    </div>

    <script>
        let mqttClient = null, isMqttConnected = false, repeticiones = 0, estadoEsqui = 'ABAJO', estadoGallina = 'ABAJO';
        const L_SH=11, R_SH=12, L_EL=13, R_EL=14, L_WR=15, R_WR=16, L_HIP=23, R_HIP=24;

        function toggleSettings() { const m = document.getElementById('settings-modal'); m.style.display = (m.style.display === 'flex') ? 'none' : 'flex'; }

        function triggerAdvance() {
            repeticiones++; document.getElementById('count').innerText = repeticiones;
            const prefix = document.getElementById('mqtt-prefix')?.value || "track01";
            const player = document.getElementById('player-select')?.value || "greencar";
            if(isMqttConnected) {
                const msg = new Paho.MQTT.Message("1");
                msg.destinationName = `${prefix}/${player}`;
                mqttClient.send(msg);
            }
        }

        function analizarMovimiento(l) {
            const TORSO_Y = ((l[L_SH].y + l[L_HIP].y) / 2 + (l[R_SH].y + l[R_HIP].y) / 2) / 2;
            const CADERA_Y = (l[L_HIP].y + l[R_HIP].y) / 2;

            // ESQUÍ: Rango corto (Torso -> Cadera)
            const manosArriba = l[L_WR].y < (TORSO_Y + 0.05);
            const manosAbajo = l[L_WR].y > (CADERA_Y - 0.05);

            if (manosArriba) estadoEsqui = 'ARRIBA';
            else if (manosAbajo && estadoEsqui === 'ARRIBA') { estadoEsqui = 'ABAJO'; triggerAdvance(); }

            // TRUCO GALLINA: Aleteo suave cerca del hombro
            const codosCercaHombro = Math.abs(l[L_EL].y - l[L_SH].y) < 0.15;
            if (codosCercaHombro && estadoGallina === 'ABAJO') { estadoGallina = 'ARRIBA'; triggerAdvance(); }
            else if (!codosCercaHombro) estadoGallina = 'ABAJO';
        }

        // MQTT Conectado con path fijo
        function connectMQTT() {
            const host = document.getElementById('mqtt-host').value;
            const port = parseInt(document.getElementById('mqtt-port').value);
            mqttClient = new Paho.MQTT.Client(host, port, "SkiWeb_" + Math.random().toString(16).substr(2, 8));
            mqttClient.connect({
                onSuccess: () => { isMqttConnected = true; toggleSettings(); },
                path: "/mqtt",
                useSSL: false
            });
        }

        const pose = new Pose({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`});
        pose.setOptions({ modelComplexity: 1, minDetectionConfidence: 0.5 });
        pose.onResults((results) => { if(results.poseLandmarks) analizarMovimiento(results.poseLandmarks); });

        async function startCamera() {
            const stream = await navigator.mediaDevices.getUserMedia({video: true});
            document.getElementById('video_element').srcObject = stream;
            function loop() { pose.send({image: document.getElementById('video_element')}).then(() => requestAnimationFrame(loop)); }
            loop();
        }
        startCamera();
    </script>
</body>
</html>
