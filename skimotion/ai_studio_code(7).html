<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkiMotion F1 Pro Dashboard</title>
    <!-- Librerías de MediaPipe -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
    <!-- Librería Paho MQTT -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js" type="text/javascript"></script>
    
    <style>
        :root {
            --green-color: #00ff00;
            --red-color: #ff003c;
        }
        body {
            margin: 0; padding: 0; background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white; overflow: hidden; /* Evita barras de scroll */
        }
        
        /* CÁMARA A PANTALLA COMPLETA */
        .video-container {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1;
        }
        video { display: none; }
        canvas { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); /* Efecto espejo */ }

        /* OVERLAY (HUD) DE CARRERA */
        .hud { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }
        
        /* CABECERA TOP */
        .top-bar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 30px; background: linear-gradient(180deg, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 100%);
            pointer-events: auto;
        }
        .stats { display: flex; align-items: center; gap: 20px; }
        .counter-box { font-size: 1.5rem; font-weight: bold; background: rgba(0,0,0,0.6); padding: 10px 20px; border-radius: 10px; border: 1px solid #333; }
        #count { color: var(--green-color); font-size: 2.5rem; margin-left: 10px;}
        .badges { display: flex; flex-direction: column; gap: 5px; }
        .badge { padding: 5px 15px; border-radius: 20px; font-size: 0.85rem; font-weight: bold; text-transform: uppercase;}
        #mqtt-status { background-color: #d32f2f; }
        #status-indicator { background-color: #ff9800; }

        /* CONTROLES DE ESQUINA SUPERIOR DERECHA */
        .top-controls { display: flex; gap: 10px; }
        button {
            pointer-events: auto; background-color: rgba(2, 136, 209, 0.8); color: white;
            border: 1px solid rgba(255,255,255,0.2); padding: 10px 15px; border-radius: 8px;
            cursor: pointer; font-size: 0.9rem; font-weight: bold; backdrop-filter: blur(5px);
            transition: all 0.3s;
        }
        button:hover { background-color: #0288d1; transform: scale(1.05); }
        button.btn-icon { font-size: 1.2rem; padding: 10px; }

        /* VELOCÍMETROS ESTILO F1 (Esquinas Inferiores) */
        .speedo-container {
            position: absolute; bottom: 30px; display: flex; flex-direction: column; align-items: center;
            background: rgba(0,0,0,0.7); border-radius: 50%; padding: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.8); border: 2px solid #333; backdrop-filter: blur(5px);
        }
        .speedo-left { left: 30px; border-color: rgba(0, 255, 0, 0.3); }
        .speedo-right { right: 30px; border-color: rgba(255, 0, 60, 0.3); }
        
        .speedo-svg { transform: rotate(-90deg); width: 140px; height: 140px; }
        .speedo-svg circle { fill: none; stroke-width: 10; stroke-linecap: round; }
        .speedo-bg { stroke: #222; }
        .speedo-bar {
            stroke-dasharray: 377; /* 2 * PI * R (R=60) = ~377 */
            stroke-dashoffset: 377;
            transition: stroke-dashoffset 0.2s ease-out, stroke 0.3s;
        }
        #bar-green { stroke: var(--green-color); filter: drop-shadow(0 0 5px var(--green-color)); }
        #bar-red { stroke: var(--red-color); filter: drop-shadow(0 0 5px var(--red-color)); }
        
        .speed-text-container { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center;}
        .speed-val { font-size: 2.2rem; font-weight: 900; font-family: 'Courier New', Courier, monospace; letter-spacing: -2px;}
        .speed-unit { font-size: 0.8rem; color: #aaa; text-transform: uppercase; }

        /* MODAL DE CONFIGURACIÓN */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); z-index: 100;
            display: none; justify-content: center; align-items: center; pointer-events: auto;
        }
        .modal-content {
            background: #1e1e1e; padding: 30px; border-radius: 15px; width: 90%; max-width: 500px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.9); border: 1px solid #444; position: relative;
        }
        .modal-close { position: absolute; top: 15px; right: 20px; font-size: 1.5rem; cursor: pointer; color: #888; }
        .modal-close:hover { color: white; }
        
        .config-item { display: flex; flex-direction: column; margin-bottom: 15px; }
        .config-item label { color: #aaa; font-size: 0.85rem; margin-bottom: 5px; }
        .config-item input, .config-item select {
            background: #2c2c2c; border: 1px solid #444; color: white; padding: 10px; border-radius: 5px; font-size: 1rem;
        }
        .f1-btn { background-color: #f57c00; width: 100%; margin-top: 15px; padding: 15px; font-size: 1.1rem; }
        .f1-btn:hover { background-color: #e65100; }

        /* EFECTO DE NIEVE */
        #snow-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; overflow: hidden;}
        .snow-particle {
            position: absolute; width: 8px; height: 8px; background: white; border-radius: 50%;
            box-shadow: 0 0 10px white; opacity: 0;
            animation: blow 1s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }
        @keyframes blow {
            0% { transform: translate(0, 0) scale(0.5); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body>

    <!-- CAPA DE CÁMARA -->
    <div class="video-container">
        <video id="video_element" autoplay playsinline muted></video>
        <canvas id="canvas_element"></canvas>
    </div>

    <!-- CAPA DE NIEVE -->
    <div id="snow-layer"></div>

    <!-- HUD INMERSIVO -->
    <div class="hud">
        <div class="top-bar">
            <div class="stats">
                <div class="counter-box">
                    AVANCES <span id="count">0</span>
                </div>
                <div class="badges">
                    <span id="mqtt-status" class="badge">🔌 MQTT Desconectado</span>
                    <span id="status-indicator" class="badge">📷 Iniciando Cámara...</span>
                </div>
            </div>
            <div class="top-controls">
                <button onclick="resetCounter()" title="Reiniciar Contador Local">🔄 Reset</button>
                <button class="btn-icon" onclick="toggleSettings()" title="Abrir Configuración">⚙️</button>
            </div>
        </div>

        <!-- VELOCÍMETRO VERDE (P1) -->
        <div class="speedo-container speedo-left">
            <svg class="speedo-svg" viewBox="0 0 140 140">
                <circle class="speedo-bg" cx="70" cy="70" r="60"></circle>
                <circle id="bar-green" class="speedo-bar" cx="70" cy="70" r="60"></circle>
            </svg>
            <div class="speed-text-container">
                <div id="val-green" class="speed-val">0.0</div>
                <div class="speed-unit">KM/H</div>
            </div>
        </div>

        <!-- VELOCÍMETRO ROJO (P2) -->
        <div class="speedo-container speedo-right">
            <svg class="speedo-svg" viewBox="0 0 140 140">
                <circle class="speedo-bg" cx="70" cy="70" r="60"></circle>
                <circle id="bar-red" class="speedo-bar" cx="70" cy="70" r="60"></circle>
            </svg>
            <div class="speed-text-container">
                <div id="val-red" class="speed-val">0.0</div>
                <div class="speed-unit">KM/H</div>
            </div>
        </div>
    </div>

    <!-- MODAL DE CONFIGURACIÓN OCULTO -->
    <div id="settings-modal" class="modal-overlay">
        <div class="modal-content">
            <span class="modal-close" onclick="toggleSettings()">✖</span>
            <h2 style="margin-top:0; border-bottom: 1px solid #444; padding-bottom:10px;">⚙️ Ajustes de Pista</h2>
            
            <div class="config-item">
                <label>Broker MQTT (OpenWrt IP):</label>
                <input type="text" id="mqtt-host" value="192.168.1.1">
            </div>
            <div class="config-item" style="display:flex; flex-direction:row; gap:10px;">
                <div style="flex:1;">
                    <label>Prefijo Pista:</label>
                    <input type="text" id="mqtt-prefix" value="track01" style="width:100%; box-sizing:border-box;">
                </div>
                <div style="width:80px;">
                    <label>Puerto:</label>
                    <input type="number" id="mqtt-port" value="9001" style="width:100%; box-sizing:border-box;">
                </div>
            </div>
            <div class="config-item">
                <label>Tu Piloto:</label>
                <select id="player-select">
                    <option value="greencar">🟢 Coche Verde (P1)</option>
                    <option value="redcar">🔴 Coche Rojo (P2)</option>
                </select>
            </div>
            <div class="config-item" style="flex-direction:row; align-items:center; gap:10px;">
                <input type="checkbox" id="chk-skeleton" checked style="width:auto;">
                <label for="chk-skeleton" style="margin:0; font-size:1rem; color:white; cursor:pointer;">Mostrar Esqueleto IA</label>
            </div>

            <button style="width:100%; background:#388e3c; margin-top:10px;" onclick="connectMQTT()">🔌 Conectar Servidor</button>
            <hr style="border: 1px solid #333; margin: 20px 0;">
            <div style="display:flex; gap:10px;">
                <input type="number" id="laps-input" value="5" min="1" max="99" style="width: 60px;">
                <button style="flex:1;" onclick="sendLaps()">🏁 Enviar Vueltas al ESP</button>
            </div>
            <button class="f1-btn" onclick="sendF1Start()">🚦 FORZAR SALIDA F1</button>
        </div>
    </div>

    <script>
        // ==========================================
        // UI & EFECTOS ESPECIALES
        // ==========================================
        function toggleSettings() {
            const modal = document.getElementById('settings-modal');
            modal.style.display = (modal.style.display === 'flex') ? 'none' : 'flex';
        }

        function resetCounter() {
            repeticiones = 0;
            document.getElementById('count').innerText = repeticiones;
        }

        function createSnowBurst() {
            const container = document.getElementById('snow-layer');
            const numParticles = 25; // Cantidad de nieve por movimiento
            for (let i = 0; i < numParticles; i++) {
                let p = document.createElement('div');
                p.className = 'snow-particle';
                // Generar en el centro de la pantalla
                p.style.left = '50vw'; p.style.top = '50vh';
                // Direcciones aleatorias explosivas
                let angle = Math.random() * Math.PI * 2;
                let distance = Math.random() * 300 + 100;
                p.style.setProperty('--tx', (Math.cos(angle) * distance) + 'px');
                p.style.setProperty('--ty', (Math.sin(angle) * distance) + 'px');
                container.appendChild(p);
                // Eliminar del DOM tras la animación (1s)
                setTimeout(() => p.remove(), 1000);
            }
        }

        function updateSpeedometer(carType, speedString) {
            // Extraer solo el número (ej: de "12.50 km/h" a 12.50)
            let speed = parseFloat(speedString);
            if(isNaN(speed)) speed = 0;
            
            // Límite visual para el velocímetro (ej: max 50 km/h)
            const MAX_SPEED = 50.0;
            let percentage = speed / MAX_SPEED;
            if(percentage > 1) percentage = 1;

            // Calculo para el circulo SVG (Offset) -> 377 es el perímetro entero
            const totalDash = 377;
            const offset = totalDash - (percentage * totalDash);

            if (carType === 'green') {
                document.getElementById('val-green').innerText = speed.toFixed(1);
                document.getElementById('bar-green').style.strokeDashoffset = offset;
            } else if (carType === 'red') {
                document.getElementById('val-red').innerText = speed.toFixed(1);
                document.getElementById('bar-red').style.strokeDashoffset = offset;
            }
        }

        // ==========================================
        // MQTT LÓGICA
        // ==========================================
        let mqttClient = null;
        let isMqttConnected = false;
        let currentPrefix = "";

        function connectMQTT() {
            const host = document.getElementById('mqtt-host').value.trim();
            const port = parseInt(document.getElementById('mqtt-port').value);
            currentPrefix = document.getElementById('mqtt-prefix').value.trim();
            const statusBadge = document.getElementById('mqtt-status');
            
            const clientId = "SkiWeb_" + Math.random().toString(16).substr(2, 8);
            mqttClient = new Paho.MQTT.Client(host, port, "/mqtt", clientId);

            mqttClient.onConnectionLost = function(responseObject) {
                isMqttConnected = false;
                statusBadge.innerText = "🔌 Desconectado"; statusBadge.style.backgroundColor = "#d32f2f";
            };

            // Escuchar mensajes entrantes (Telemetría de Velocidad)
            mqttClient.onMessageArrived = function(message) {
                const topic = message.destinationName;
                const payload = message.payloadString;
                
                if(topic === `${currentPrefix}/greenspeed`) {
                    updateSpeedometer('green', payload);
                } else if (topic === `${currentPrefix}/redspeed`) {
                    updateSpeedometer('red', payload);
                }
            };

            const options = {
                onSuccess: function() {
                    isMqttConnected = true;
                    statusBadge.innerText = "🔌 Conectado ✅"; statusBadge.style.backgroundColor = "#388e3c";
                    toggleSettings(); // Cierra el modal al conectar con éxito
                    
                    // SUSCRIBIRSE A LOS TOPICS DE VELOCIDAD
                    mqttClient.subscribe(`${currentPrefix}/greenspeed`);
                    mqttClient.subscribe(`${currentPrefix}/redspeed`);
                    console.log("Suscrito a telemetría de velocidad.");
                },
                onFailure: function() {
                    isMqttConnected = false; alert("Falló la conexión MQTT a OpenWrt.");
                }
            };

            statusBadge.innerText = "Conectando..."; statusBadge.style.backgroundColor = "#ff9800";
            mqttClient.connect(options);
        }

        function sendMQTTCommand(topic, payload) {
            if (isMqttConnected && mqttClient) {
                const message = new Paho.MQTT.Message(payload.toString());
                message.destinationName = topic;
                mqttClient.send(message);
            }
        }

        function triggerAdvance() {
            // Lógica visual
            repeticiones += 1;
            document.getElementById('count').innerText = repeticiones;
            createSnowBurst();
            
            // Envío a Servidor
            const prefix = document.getElementById('mqtt-prefix').value.trim();
            const player = document.getElementById('player-select').value;
            sendMQTTCommand(`${prefix}/${player}`, "1");
        }

        function sendF1Start() { sendMQTTCommand(`${currentPrefix}/start`, "1"); resetCounter(); toggleSettings(); }
        function sendLaps() { sendMQTTCommand(`${currentPrefix}/set_laps`, document.getElementById('laps-input').value); }


        // ==========================================
        // IA & MEDIAPIPE (Con Truco de la Gallina)
        // ==========================================
        const videoElement = document.getElementById('video_element');
        const canvasElement = document.getElementById('canvas_element');
        const canvasCtx = canvasElement.getContext('2d');
        const statusIndicator = document.getElementById('status-indicator');

        let repeticiones = 0;
        let estadoEsqui = 'ABAJO';
        let estadoGallina = 'ABAJO'; // Máquina de estado secreta

        const L_SH = 11, R_SH = 12; // Hombros
        const L_WR = 15, R_WR = 16; // Muñecas
        const L_EL = 13, R_EL = 14; // Codos
        const L_HIP = 23, R_HIP = 24; // Caderas

        function onResults(results) {
            // Ajustar tamaño del canvas a la resolución real del video para evitar deformaciones IA
            if (canvasElement.width !== videoElement.videoWidth) {
                canvasElement.width = videoElement.videoWidth;
                canvasElement.height = videoElement.videoHeight;
            }

            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

            if (results.poseLandmarks) {
                if (document.getElementById('chk-skeleton').checked) {
                    drawConnectors(canvasCtx, results.poseLandmarks, POSE_CONNECTIONS, {color: 'rgba(255,255,255,0.5)', lineWidth: 4});
                    drawLandmarks(canvasCtx, results.poseLandmarks, {color: '#00ff00', lineWidth: 2});
                }
                analizarMovimiento(results.poseLandmarks);
            }
            canvasCtx.restore();
        }

        function analizarMovimiento(l) {
            // 1. LÓGICA DE ESQUÍ NORMAL (Basado en muñecas)
            const mitadTorsoY = ((l[L_SH].y + l[L_HIP].y) / 2 + (l[R_SH].y + l[R_HIP].y) / 2) / 2;
            const manosArriba = l[L_WR].y < l[L_SH].y && l[R_WR].y < l[R_SH].y;
            const manosAbajo = l[L_WR].y > mitadTorsoY && l[R_WR].y > mitadTorsoY;

            if (manosArriba) {
                if (estadoEsqui !== 'ARRIBA') { estadoEsqui = 'ARRIBA'; statusIndicator.innerText = "Posición OK"; statusIndicator.style.backgroundColor = "#2196F3"; }
            } else if (manosAbajo) {
                if (estadoEsqui === 'ARRIBA') {
                    estadoEsqui = 'ABAJO';
                    statusIndicator.innerText = "¡Impulso!"; statusIndicator.style.backgroundColor = "#4CAF50"; 
                    triggerAdvance(); // Ejecutar avance
                }
            }

            // 2. LÓGICA HUEVO DE PASCUA: "LA GALLINA" (Basado en codos aleteando rápido)
            // Si los codos suben por encima de los hombros
            const codosArriba = l[L_EL].y < l[L_SH].y && l[R_EL].y < l[R_SH].y;
            // Si los codos bajan un poco por debajo de los hombros
            const codosAbajo = l[L_EL].y > l[L_SH].y + 0.05 && l[R_EL].y > l[R_SH].y + 0.05;

            if (codosArriba) {
                if (estadoGallina !== 'ARRIBA') estadoGallina = 'ARRIBA';
            } else if (codosAbajo) {
                if (estadoGallina === 'ARRIBA') {
                    estadoGallina = 'ABAJO';
                    statusIndicator.innerText = "🐓 ¡Truco Gallina!"; statusIndicator.style.backgroundColor = "#e91e63";
                    // La gallina cuenta como un avance instantáneo (más rápido que agacharse)
                    triggerAdvance(); 
                }
            }
        }

        const pose = new Pose({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`});
        pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, enableSegmentation: false, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
        pose.onResults(onResults);

        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user", width: { ideal: 1280 }, height: { ideal: 720 } } });
                videoElement.srcObject = stream;
                videoElement.onloadedmetadata = () => { videoElement.play(); statusIndicator.innerText = "Cámara Lista"; processVideo(); };
            } catch (err) { statusIndicator.innerText = "Error Cámara"; alert("No se pudo iniciar la cámara."); }
        }

        async function processVideo() {
            if (videoElement.readyState >= 2) await pose.send({image: videoElement});
            requestAnimationFrame(processVideo);
        }

        // Iniciar
        startCamera();
        // Mostrar modal al cargar por primera vez
        document.getElementById('settings-modal').style.display = 'flex';
    </script>
</body>
</html>
